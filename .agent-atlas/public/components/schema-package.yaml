  - type: implements
    target: workflow:define-atlas-model
  - type: documented-in
    target: document:entity-spec
  - type: documented-in
    target: document:relation-spec
  - type: documented-in
    target: document:versioning-spec
  - type: documented-in
    target: document:validation-spec
  - type: tested-by
    target: test-scope:workspace-build-and-test
