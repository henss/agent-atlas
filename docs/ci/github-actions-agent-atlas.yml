name: Agent Atlas

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  atlas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test
      - run: pnpm -r lint
      - run: node packages/cli/dist/index.js validate .
      - run: node packages/cli/dist/index.js generate markdown --profile public --json
